<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bondex Web Controller</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 20px; width: 100%; max-width: 500px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h1 { color: #f44336; margin-top: 0; }
        .device-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .device-item:last-child { border-bottom: none; }
        .status { font-size: 0.8em; padding: 2px 6px; border-radius: 4px; }
        .online { background: #4caf50; }
        .offline { background: #f44336; }
        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-lock { background: #f44336; color: white; }
        .btn-lock:hover { background: #d32f2f; }
        .btn-unlock { background: #4caf50; color: white; }
        .btn-unlock:hover { background: #388e3c; }
        select { width: 100%; padding: 10px; margin-bottom: 15px; background: #333; color: white; border: 1px solid #444; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>BONDEX REMOTE</h1>
    <div class="card">
        <h3>Target Device</h3>
        <select id="deviceSelect">
            <option value="all">ALL DEVICES (Broadcast)</option>
        </select>

        <div id="deviceList">
            <!-- List HP akan muncul di sini -->
        </div>

        <div class="controls">
            <button class="btn-lock" id="btnLock">LOCK</button>
            <button class="btn-unlock" id="btnUnlock">UNLOCK</button>
        </div>
        <p id="statusMsg" style="text-align: center; font-size: 0.9em; color: #aaa; margin-top: 15px;"></p>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
