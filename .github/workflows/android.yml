name: Android Build & Overwrite Release

on:
  push:
    branches:
      - master # Ganti dengan branch utama kamu

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Update Existing Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "app/build/outputs/apk/debug/*.apk"
          tag: "latest"
          name: "RansomDex Latest Preview"
          body: "Build otomatis terbaru. Rilis ini selalu diperbarui setiap kali ada perubahan kode."
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
