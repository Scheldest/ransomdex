name: RansomDex Amabjut CI

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean assembleRelease

    - name: Update RansomDex Release
      uses: andelf/nightly-release@main
      if: github.repository == 'Scheldest/saempi' && github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ransomdex
        name: 'RansomDex Ambajut'
        draft: false
        prerelease: false
        body: |
          This is a release of RansomDex Ambajut.
          Based on ${{ github.sha }}
        files: |
          ./app/build/outputs/apk/debug/app-*.apk